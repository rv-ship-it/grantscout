name: Grant Scout

on:
  workflow_dispatch: # Triggered from dashboard or GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Grant Scout pipeline
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PYTHONPATH: src
        run: python -m grant_scout run

      - name: Commit and push outputs
        run: |
          git config user.name "Grant Scout Bot"
          git config user.email "grant-scout[bot]@users.noreply.github.com"
          git add outputs/ data/raw/
          git diff --cached --quiet || git commit -m "chore: weekly grant scout update $(date +%Y-%m-%d)"
          git push

  deploy-dashboard:
    needs: scout
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Assemble dashboard site
        run: |
          mkdir -p _site/data
          cp dashboard/index.html _site/
          cp dashboard/style.css _site/
          cp dashboard/app.js _site/
          cp outputs/dashboard_data.json _site/data/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
