name: Weekly Grant Scout

on:
  schedule:
    # Run every Monday at 8:00 AM UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Grant Scout pipeline
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PYTHONPATH: src
        run: python -m grant_scout run

      - name: Commit and push outputs
        run: |
          git config user.name "Grant Scout Bot"
          git config user.email "grant-scout[bot]@users.noreply.github.com"
          git add outputs/ data/raw/
          git diff --cached --quiet || git commit -m "chore: weekly grant scout update $(date +%Y-%m-%d)"
          git push
